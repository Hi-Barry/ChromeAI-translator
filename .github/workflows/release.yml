name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Package CRX
        env:
          EXTENSION_KEY: ${{ secrets.CRX_KEY }}
        run: |
          EXT_DIR=$(pwd)
          VERSION=${GITHUB_REF#refs/tags/}
          EXT_NAME="ChromeAI-translator"
          
          # 1. 还原私钥文件（临时存放在 /tmp）
          echo "$EXTENSION_KEY" > /tmp/key.pem
          
          # 2. 使用 Chromium 无头模式打包
          # 注意：--no-sandbox 是在 Docker/CI 环境运行 Chromium 的必要参数
          chromium-browser --headless --no-sandbox --pack-extension="$EXT_DIR" --pack-extension-key=/tmp/key.pem
          
          # 3. 确定打包出来的文件名（Chromium 默认以“当前文件夹名”命名产物）
          # 我们获取当前文件夹的名称，并寻找对应的 .crx
          CURRENT_DIR_NAME=$(basename "$EXT_DIR")
          
          if [ -f "../${CURRENT_DIR_NAME}.crx" ]; then
            # 移动到当前目录并重命名
            mv "../${CURRENT_DIR_NAME}.crx" "./${EXT_NAME}-${VERSION}.crx"
            echo "Successfully created: ${EXT_NAME}-${VERSION}.crx"
          elif [ -f "./${CURRENT_DIR_NAME}.crx" ]; then
            mv "./${CURRENT_DIR_NAME}.crx" "./${EXT_NAME}-${VERSION}.crx"
            echo "Successfully created: ${EXT_NAME}-${VERSION}.crx"
          else
            echo "Error: CRX file not found. Listing files for debugging:"
            ls -R ..
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ChromeAI-translator-*.crx
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
