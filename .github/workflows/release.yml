name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Package CRX
        run: |
          EXT_DIR=$(pwd)
          EXT_NAME="ChromeAI-translator"
          VERSION=${GITHUB_REF#refs/tags/}
          
          # Use chromium instead of google-chrome
          chromium --pack-extension="$EXT_DIR" --pack-extension-key=/tmp/key.pem 2>&1 || true
          
          # If packing fails, try alternative
          if [ ! -f "${EXT_NAME}.crx" ]; then
            chromium --pack-extension="$EXT_DIR" 2>&1
          fi
          
          # Rename to match version
          if [ -f "${EXT_NAME}.crx" ]; then
            mv "${EXT_NAME}.crx" "${EXT_NAME}-${VERSION}.crx"
            echo "CRX created successfully"
          else
            echo "CRX creation failed"
            ls -la *.crx 2>/dev/null || echo "No CRX files found"
            # Try again with chrome as fallback
            which google-chrome && google-chrome --pack-extension="$EXT_DIR"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ChromeAI-translator-*.crx
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}