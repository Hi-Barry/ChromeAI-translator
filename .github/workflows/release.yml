name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Package CRX
        env:
          EXTENSION_KEY: ${{ secrets.CRX_KEY }}
        run: |
          # 1. 获取版本号和变量
          VERSION=${GITHUB_REF#refs/tags/}
          EXT_NAME="ChromeAI-translator"
          CURRENT_DIR=$(pwd)
          
          # 2. 准备私钥 (存放在当前目录之外，避免 Chromium 报错 "key file included")
          echo "$EXTENSION_KEY" > ../key.pem
          
          # 3. 执行打包
          # --no-sandbox: CI 环境运行必须
          # --pack-extension: 指向当前源码目录
          # --pack-extension-key: 指向刚才放在外部的私钥
          chromium-browser --headless --no-sandbox \
            --pack-extension="$CURRENT_DIR" \
            --pack-extension-key="../key.pem"
          
          # 4. 寻找并重命名产物
          # Chromium 打包后的 .crx 默认会出现在被打包文件夹的“同级目录”
          # 假设当前目录名是 'ChromeAI-translator'，产物就是 '../ChromeAI-translator.crx'
          DIR_BASE_NAME=$(basename "$CURRENT_DIR")
          EXPECTED_CRX="../${DIR_BASE_NAME}.crx"
          
          echo "Checking for CRX at: $EXPECTED_CRX"
          
          if [ -f "$EXPECTED_CRX" ]; then
            mv "$EXPECTED_CRX" "./${EXT_NAME}-${VERSION}.crx"
            echo "Successfully prepared: ${EXT_NAME}-${VERSION}.crx"
          else
            echo "CRX not found at expected path. Searching in parent directory..."
            FOUND_CRX=$(find .. -maxdepth 1 -name "*.crx" | head -n 1)
            if [ -n "$FOUND_CRX" ]; then
              mv "$FOUND_CRX" "./${EXT_NAME}-${VERSION}.crx"
              echo "Found and moved: $FOUND_CRX"
            else
              echo "Error: Cannot find any .crx file."
              ls -la ..
              exit 1
            fi
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 自动上传刚才重命名好的文件
          files: |
            ChromeAI-translator-*.crx
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
