name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 保持稳定版本

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Package CRX
        env:
          EXTENSION_KEY: ${{ secrets.CRX_KEY }}
        run: |
          # 1. 准备私钥
          echo "$EXTENSION_KEY" > ../key.pem
          
          # 获取版本号
          VERSION=${GITHUB_REF#refs/tags/}
          EXT_NAME="ChromeAI-translator"
          
          # 2. 执行打包 (注意路径，我们直接在当前目录下打包)
          # --no-sandbox 是 CI 环境必须的
          chromium-browser --headless --no-sandbox --pack-extension="./" --pack-extension-key="../key.pem"
          
          # 3. Chromium 打包出来的文件名通常是 [当前文件夹名].crx
          # 假设你的项目文件夹在 CI 里叫 ChromeAI-translator
          # 它可能会生成在当前目录，也可能在上一级目录
          
          EXPECTED_NAME="ChromeAI-translator.crx"
          
          # 查找并重命名
          if [ -f "../$EXPECTED_NAME" ]; then
            mv "../$EXPECTED_NAME" "./${EXT_NAME}-${VERSION}.crx"
          elif [ -f "./$EXPECTED_NAME" ]; then
            mv "./$EXPECTED_NAME" "./${EXT_NAME}-${VERSION}.crx"
          else
            # 如果还是找不到，搜索一下所有的 crx
            FOUND_CRX=$(find . -maxdepth 2 -name "*.crx" | head -n 1)
            if [ -n "$FOUND_CRX" ]; then
              mv "$FOUND_CRX" "./${EXT_NAME}-${VERSION}.crx"
            else
              echo "Error: Cannot find any .crx file."
              ls -R ..
              exit 1
            fi
          fi
          
          echo "Final CRX prepared: $(ls ${EXT_NAME}-${VERSION}.crx)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 明确指定文件名，不要用通配符，防止找不到文件报 22 错误
          files: ChromeAI-translator-*.crx
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
